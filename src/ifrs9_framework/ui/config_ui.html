<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MLOps Self-Service Configurator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8f9fa; }
        .feature-checkbox:checked + div { background-color: #eff6ff; border-color: #3b82f6; }
        
        /* Classes auxiliares para as abas */
        .tab-active { @apply flex items-center space-x-3 px-4 py-3 bg-blue-600 text-white rounded-lg transition-colors; }
        .tab-inactive { @apply flex items-center space-x-3 px-4 py-3 text-slate-400 hover:text-slate-200 hover:bg-slate-800 rounded-lg transition-colors; }
    </style>
</head>
<body class="h-screen w-screen flex text-slate-800 overflow-hidden">

    <aside class="w-64 bg-slate-900 text-slate-300 flex flex-col z-20 shadow-2xl">
        <div class="p-6 border-b border-slate-800 flex items-center space-x-3">
            <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><polygon points="12 2 2 7 12 12 22 7 12 2"></polygon><polyline points="2 17 12 22 22 17"></polyline><polyline points="2 12 12 17 22 12"></polyline></svg>
            </div>
            <h1 class="font-bold text-lg text-white">AutoML Config</h1>
        </div>
        <nav class="flex-1 py-6 space-y-2 px-4">
            <button onclick="switchTab('data')" id="nav-data" class="w-full text-left tab-active">
                <span class="font-medium">1. Data & Recipe</span>
            </button>
            <button onclick="switchTab('model')" id="nav-model" class="w-full text-left tab-inactive">
                <span class="font-medium">2. Model & Tuning</span>
            </button>
        </nav>
        <div class="p-6 border-t border-slate-800 space-y-3">
            <button onclick="saveConfigToAPI()" id="btnSave" class="w-full py-3 bg-blue-600 hover:bg-blue-500 text-white font-semibold rounded-lg shadow-lg flex justify-center items-center space-x-2 transition-colors">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg>
                <span>Salvar YAML</span>
            </button>
            <button onclick="triggerPipeline()" id="btnRun" class="w-full py-3 bg-green-600 hover:bg-green-500 text-white font-semibold rounded-lg shadow-lg flex justify-center items-center space-x-2 transition-colors">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
                <span>Iniciar Treinamento</span>
            </button>
        </div>
    </aside>

    <main class="flex-1 overflow-y-auto bg-slate-50 relative p-8">
        
        <!-- Tab 1: Data & Recipe -->
        <div id="tab-data" class="max-w-6xl mx-auto space-y-6 block">
            <div class="flex justify-between items-center mb-8">
                <div>
                    <h2 class="text-2xl font-bold text-slate-800">Feature Engineering Recipe</h2>
                    <p class="text-slate-500 text-sm mt-1">Selecione as variáveis para visualizar a distribuição de risco.</p>
                </div>
            </div>

            <div class="grid grid-cols-3 gap-6">
                <!-- Painel Esquerdo: Lista Clicável -->
                <div class="col-span-1 bg-white p-5 rounded-xl border border-slate-200 shadow-sm h-[600px] flex flex-col">
                    <h3 class="font-semibold text-slate-700 mb-4 border-b pb-2">Colunas Dinâmicas</h3>
                    <div class="flex-1 overflow-y-auto space-y-2 pr-2" id="feature-list">
                        <!-- Gerado via JS -->
                    </div>
                </div>

                <!-- Painel Direito: Gráfico -->
                <div class="col-span-2 bg-white p-5 rounded-xl border border-slate-200 shadow-sm h-[600px] flex flex-col">
                    <div class="flex justify-between items-start border-b pb-4 mb-4">
                        <div>
                            <h3 class="font-semibold text-slate-800 text-lg" id="feature-name-display">renda</h3>
                            <p class="text-sm text-slate-500">Visualização de Data Drift e Risco</p>
                        </div>
                    </div>
                    <div class="flex-1 flex flex-col">
                        <div class="flex-1 bg-slate-50 rounded-lg border border-slate-100 p-4 relative">
                            <canvas id="featureChart"></canvas>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Tab 2: Model & Tuning -->
        <div id="tab-model" class="max-w-4xl mx-auto space-y-6 hidden">
            <div>
                <h2 class="text-2xl font-bold text-slate-800">Model Architecture & Optuna</h2>
            </div>
            <div class="bg-white p-6 rounded-xl border border-slate-200 shadow-sm space-y-6">
                <div>
                    <h3 class="font-semibold text-slate-700 mb-3 border-b pb-2">1. Seleção do Algoritmo</h3>
                    <div class="grid grid-cols-2 gap-4">
                        <label class="relative cursor-pointer">
                            <input type="radio" name="algo" value="catboost" class="peer sr-only">
                            <div class="p-4 rounded-lg border-2 border-slate-200 peer-checked:border-blue-500 peer-checked:bg-blue-50">
                                <h4 class="font-bold text-slate-800">CatBoost</h4>
                                <p class="text-xs text-slate-500 mt-1">Melhor para evitar overfitting.</p>
                            </div>
                        </label>
                        <label class="relative cursor-pointer">
                            <input type="radio" name="algo" value="lightgbm" class="peer sr-only" checked>
                            <div class="p-4 rounded-lg border-2 border-slate-200 peer-checked:border-blue-500 peer-checked:bg-blue-50">
                                <h4 class="font-bold text-slate-800">LightGBM</h4>
                                <p class="text-xs text-slate-500 mt-1">Agressivo e extremamente rápido.</p>
                            </div>
                        </label>
                    </div>
                </div>
                <div>
                    <h3 class="font-semibold text-slate-700 mb-3 border-b pb-2">2. Otimização Bayesiana (Optuna)</h3>
                    <label class="flex items-center cursor-pointer">
                        <input type="checkbox" id="autoTune" class="w-4 h-4 text-blue-600 bg-gray-100 border-gray-300 rounded" checked>
                        <span class="ml-2 text-sm font-medium text-gray-900">Ativar Auto-Tuning (Pesquisa de Hiperparâmetros)</span>
                    </label>
                </div>
            </div>
        </div>
    </main>

    <!-- Notificações Toast -->
    <div id="toast" class="fixed bottom-5 right-5 bg-green-500 text-white px-6 py-3 rounded shadow-lg transform transition-transform duration-300 translate-y-20 opacity-0 z-50">
        Mensagem aqui
    </div>

    <script>
        const API_URL = "http://localhost:8000/api";
        let featureChartInst = null;

        // Dados simulados para o dinamismo do gráfico
        const chartDataMocks = {
            'renda': { vol: [12000, 19000, 3000, 500, 100], def: [1.2, 1.8, 3.5, 8.2, 15.4] },
            'idade': { vol: [2000, 15000, 25000, 12000, 3000], def: [8.2, 4.8, 2.5, 1.2, 0.8] },
            'bureau_score': { vol: [5000, 10000, 20000, 15000, 8000], def: [18.5, 12.0, 5.5, 2.1, 0.5] },
            'prazo_meses': { vol: [30000, 10000, 5000, 2000, 500], def: [1.0, 3.2, 6.5, 11.2, 22.4] },
            'default': { vol: [10000, 10000, 10000, 10000, 10000], def: [3, 3.5, 4, 4.5, 5] }
        };

        function showToast(message, isError = false) {
            const toast = document.getElementById('toast');
            toast.innerText = message;
            toast.className = `fixed bottom-5 right-5 px-6 py-3 rounded shadow-lg transform transition-transform duration-300 z-50 ${isError ? 'bg-red-500' : 'bg-green-500'} text-white`;
            toast.classList.remove('translate-y-20', 'opacity-0');
            setTimeout(() => toast.classList.add('translate-y-20', 'opacity-0'), 3000);
        }

        async function saveConfigToAPI() {
            const btn = document.getElementById('btnSave');
            btn.innerHTML = 'Salvando...';

            const payload = {
                pipeline_name: "ifrs9_credit_origination",
                target: "default_flag",
                numeric_features: [
                    "idade", "renda", "bureau_score", "prazo_meses", 
                    "limite_credito", "valor_financiado", "selic_contratacao"
                ],
                categorical_features: ["uf", "tipo_produto"],
                yeo_johnson_features: ["renda", "limite_credito", "valor_financiado"],
                algorithm: document.querySelector('input[name="algo"]:checked').value,
                auto_tune: document.getElementById('autoTune').checked
            };

            try {
                const response = await fetch(`${API_URL}/save-config`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                if(response.ok) {
                    showToast(`YAML salvo! Algoritmo selecionado: ${payload.algorithm.toUpperCase()}`);
                } else {
                    const data = await response.json();
                    showToast("Erro: " + data.detail, true);
                }
            } catch (error) {
                showToast("Erro de conexão com a API Python.", true);
            } finally {
                btn.innerHTML = `<span>Salvar YAML</span>`;
            }
        }

        async function triggerPipeline() {
            try {
                const response = await fetch(`${API_URL}/run-pipeline`, { method: 'POST' });
                if(response.ok) {
                    showToast("Treinamento iniciado em background!");
                }
            } catch (error) {
                showToast("Erro ao iniciar pipeline.", true);
            }
        }

        // Lógica de Abas Consertada
        function switchTab(tab) {
            document.getElementById('tab-data').style.display = tab === 'data' ? 'block' : 'none';
            document.getElementById('tab-model').style.display = tab === 'model' ? 'block' : 'none';
            
            document.getElementById('nav-data').className = tab === 'data' ? 'w-full text-left tab-active' : 'w-full text-left tab-inactive';
            document.getElementById('nav-model').className = tab === 'model' ? 'w-full text-left tab-active' : 'w-full text-left tab-inactive';
        }

        // Renderização Dinâmica do Gráfico
        function updateChart(featureName) {
            document.getElementById('feature-name-display').innerText = featureName.toUpperCase();
            
            const data = chartDataMocks[featureName] || chartDataMocks['default'];
            
            if (featureChartInst) {
                featureChartInst.data.datasets[0].data = data.vol;
                featureChartInst.data.datasets[1].data = data.def;
                featureChartInst.update();
            }
        }

        function initUI() {
            // Inicializa o Gráfico com Renda
            const ctx = document.getElementById('featureChart').getContext('2d');
            featureChartInst = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: ['Q1', 'Q2', 'Q3', 'Q4', 'Q5'],
                    datasets: [
                        { type: 'bar', label: 'Volume de Contratos', data: chartDataMocks['renda'].vol, backgroundColor: 'rgba(148,163,184,0.5)', yAxisID: 'y' },
                        { type: 'line', label: 'Inadimplência (%)', data: chartDataMocks['renda'].def, borderColor: '#ef4444', borderWidth: 2, yAxisID: 'y1' }
                    ]
                },
                options: { responsive: true, maintainAspectRatio: false, scales: { y: { display: false }, y1: { position: 'right' } } }
            });

            // Cria a lista interativa de features
            const mockFeatures = [
                { name: 'idade', role: 'numeric' }, { name: 'renda', role: 'numeric' }, 
                { name: 'bureau_score', role: 'numeric' }, { name: 'prazo_meses', role: 'numeric' },
                { name: 'limite_credito', role: 'numeric' }, { name: 'valor_financiado', role: 'numeric' },
                { name: 'selic_contratacao', role: 'numeric' }, { name: 'uf', role: 'categorical' },
                { name: 'tipo_produto', role: 'categorical' }, { name: 'default_flag', role: 'target' }
            ];
            
            const list = document.getElementById('feature-list');
            mockFeatures.forEach((f, idx) => {
                const color = f.role === 'target' ? 'bg-red-100 text-red-700' : f.role === 'categorical' ? 'bg-purple-100 text-purple-700' : 'bg-slate-100 text-slate-700';
                const isChecked = f.name === 'renda' ? 'checked' : '';
                
                list.innerHTML += `
                    <label class="block cursor-pointer relative mb-2">
                        <input type="radio" name="feature_select" class="peer sr-only feature-checkbox" ${isChecked} onchange="updateChart('${f.name}')">
                        <div class="p-3 border rounded-lg hover:bg-slate-50 transition-colors flex justify-between items-center">
                            <span class="font-medium text-sm text-slate-700">${f.name}</span>
                            <span class="text-[10px] px-2 py-0.5 rounded-full font-semibold uppercase ${color}">${f.role}</span>
                        </div>
                    </label>
                `;
            });
        }

        window.onload = initUI;
    </script>
</body>
</html>
