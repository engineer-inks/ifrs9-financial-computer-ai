pipeline_name: ifrs9_credit_origination
version: 1.1.0
environment: development
recipe:
  target: default_flag
  features:
    numeric:
    - idade
    - renda
    - bureau_score
    - prazo_meses
    - limite_credito
    - valor_financiado
    - selic_contratacao
    categorical:
    - uf
    - tipo_produto
  engineering:
    apply_yeo_johnson_to:
    - renda
    - limite_credito
    - valor_financiado
model_training:
  algorithm: catboost
  hyperparameter_tuning:
    auto_tune: true
    engine: optuna
